name: Build macOS app

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: bar
    env:
      APP_NAME: CCWatchBar
      BUNDLE_ID: eu.tomaskral.ccwatch
      TEAM_ID: N3ZB9269M7
    steps:
      - uses: actions/checkout@v4

      - name: Install the Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and package app
        run: bash scripts/package-app.sh

      - name: Sign app
        run: |
          codesign --force --deep --options runtime \
            --sign "Developer ID Application: Tomas Kral ($TEAM_ID)" \
            --entitlements CCWatchBar.entitlements \
            --identifier "$BUNDLE_ID" \
            "$APP_NAME.app"

          codesign --verify --deep --strict "$APP_NAME.app"

      - name: Notarize app
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          ditto -c -k --keepParent "$APP_NAME.app" "$APP_NAME.zip"

          API_KEY_PATH=$RUNNER_TEMP/api_key.p8
          echo -n "$ASC_API_KEY" | base64 --decode -o $API_KEY_PATH

          xcrun notarytool submit "$APP_NAME.zip" \
            --key "$API_KEY_PATH" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_NAME.app"

      - name: Create release zip
        run: |
          rm -f "$APP_NAME.zip"
          ditto -c -k --keepParent "$APP_NAME.app" "$APP_NAME.zip"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG_NAME" "$APP_NAME.zip" --clobber

      - name: Clean up keychain and credentials
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -f $RUNNER_TEMP/api_key.p8
